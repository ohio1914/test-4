name: Build BeatBuzz IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project BeatBuzzApp.xcodeproj \
            -scheme BeatBuzzApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package as IPA
        run: |
          cd build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -R BeatBuzzApp.app Payload/
          zip -r BeatBuzzApp.ipa Payload
          mv BeatBuzzApp.ipa $GITHUB_WORKSPACE/BeatBuzzApp.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BeatBuzzApp-ipa
          path: BeatBuzzApp.ipa
